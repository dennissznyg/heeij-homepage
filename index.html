<!-- Language router. Each language lives in its own folder: /dk/ (Danish). Add more below and in the script/hreflang. -->
<link rel="alternate" hreflang="da" href="https://dennissznyg.github.io/heeij-homepage/dk/">
<link rel="alternate" hreflang="x-default" href="https://dennissznyg.github.io/heeij-homepage/dk/">
<!-- When English is ready: <link rel="alternate" hreflang="en" href="https://dennissznyg.github.io/heeij-homepage/en/"> -->
<script>
  (function () {
    // Folders that actually exist, in priority order. Add 'en' here when /en/ is built.
    var supported = ['dk'];
    var fallback = 'dk';
    // Map 2-letter browser language codes to our folder names.
    var map = { da: 'dk', en: 'en' };
    var langs = navigator.languages || [navigator.language || 'da'];
    var target = fallback;
    for (var i = 0; i < langs.length; i++) {
      var folder = map[(langs[i] || '').slice(0, 2).toLowerCase()];
      if (folder && supported.indexOf(folder) !== -1) { target = folder; break; }
    }
    location.replace(target + '/');
  })();
</script>
