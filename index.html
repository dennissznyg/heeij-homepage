<!doctype html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heeij</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<!-- Language router. Each language lives in its own folder: /dk/ (Danish), /en/ (English). To add a language: create the folder, then add it to `supported` + `map` below and to the hreflang links. -->
<link rel="alternate" hreflang="da" href="https://dennissznyg.github.io/heeij-homepage/dk/">
<link rel="alternate" hreflang="en" href="https://dennissznyg.github.io/heeij-homepage/en/">
<link rel="alternate" hreflang="x-default" href="https://dennissznyg.github.io/heeij-homepage/dk/">
<script>
  (function () {
    var supported = ['dk', 'en'];   // folders that exist
    var fallback = 'dk';            // Danish stays the default
    // 1. Remembered choice (set on every content page; the language toggle switches it).
    try {
      var saved = localStorage.getItem('heeij_lang');
      if (saved && supported.indexOf(saved) !== -1) { location.replace(saved + '/'); return; }
    } catch (e) {}
    // 2. Browser preference (Accept-Language). Map 2-letter codes to folder names.
    var map = { da: 'dk', en: 'en' };
    var langs = navigator.languages || [navigator.language || 'da'];
    var target = fallback;
    for (var i = 0; i < langs.length; i++) {
      var folder = map[(langs[i] || '').slice(0, 2).toLowerCase()];
      if (folder && supported.indexOf(folder) !== -1) { target = folder; break; }
    }
    // 3. Fallback Danish.
    location.replace(target + '/');
  })();
</script>
<noscript><meta http-equiv="refresh" content="0; url=dk/"></noscript>
<style>
  body{margin:0;font-family:"Hanken Grotesk",system-ui,sans-serif;background:#F7F5EF;color:#163763;
    display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center}
  a{color:#2F6FE4}
</style>
</head>
<body>
<p>Redirecting … · <a href="dk/">Dansk</a> · <a href="en/">English</a></p>
</body>
</html>
